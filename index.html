<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice FIR Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .voice-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .voice-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .voice-button.recording {
            background: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .status-text {
            flex: 1;
            color: #666;
            font-size: 14px;
        }

        .status-text.listening {
            color: #e74c3c;
            font-weight: bold;
        }

        .language-selector {
            padding: 8px 12px;
            border: 2px solid #667eea;
            border-radius: 20px;
            background: white;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .typing-indicator {
            display: none;
            padding: 10px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚔 AI Voice FIR Assistant</h1>
            <p>Speak your complaint in your language</p>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="message-content">
                    Namaste! I'm your AI assistant. Please tell me about your complaint. You can speak in English, Hindi, or Telugu.
                </div>
            </div>
        </div>

        <div class="input-area">
            <select class="language-selector" id="languageSelect" title="Select your language - AI will respond in this language">
                <option value="en-IN">🇬🇧 English</option>
                <option value="hi-IN">🇮🇳 हिंदी (Hindi)</option>
                <option value="te-IN">🇮🇳 తెలుగు (Telugu)</option>
            </select>

            <input type="text"
                   id="textInput"
                   placeholder="Type your message or click mic..."
                   style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 20px; outline: none; font-size: 14px;"
                   onkeypress="if(event.key==='Enter') sendTextMessage()">

            <button onclick="sendTextMessage()"
                    style="padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px;">
                Send ➤
            </button>

            <button class="voice-button" id="voiceButton" title="Click to speak">
                🎤
            </button>
        </div>

        <div style="padding: 10px; text-align: center; background: #f0f0f0; font-size: 12px; color: #666;">
            🎤 Select language → Speak or type → AI responds in your language! 🔊
            <div style="font-size: 11px; color: #888; margin-top: 5px;">
                💡 <a href="VOICE_SETUP.md" target="_blank" style="color: #667eea;">Install Telugu/Hindi voice packs</a> for voice output
            </div>
        </div>
    </div>

    <script src="audio_player.js"></script>
    <script src="app.js"></script>
</body>
</html>
