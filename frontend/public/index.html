<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praja - AI FIR Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            margin: 20px;
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 20px;
            color: #666;
            margin-bottom: 40px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .feature-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 14px;
            color: #666;
        }

        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 30px;
            transition: transform 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇮🇳 Praja</h1>
        <p class="subtitle">AI-Powered FIR Assistant for India</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🎤</div>
                <div class="feature-title">Voice Input</div>
                <div class="feature-desc">Speak naturally in your language</div>
            </div>

            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div class="feature-title">AI Assistant</div>
                <div class="feature-desc">Smart conversation flow</div>
            </div>

            <div class="feature">
                <div class="feature-icon">🗣️</div>
                <div class="feature-title">Multi-Language</div>
                <div class="feature-desc">Telugu, Hindi, English</div>
            </div>

            <div class="feature">
                <div class="feature-icon">🔊</div>
                <div class="feature-title">Voice Response</div>
                <div class="feature-desc">Natural Indian voices</div>
            </div>
        </div>

        <a href="/fir-assistant.html" class="cta-button">
            Start Filing FIR →
        </a>

        <div class="footer">
            Powered by Sarvam AI 🇮🇳 • Made in India
        </div>
    </div>
</body>
</html>
